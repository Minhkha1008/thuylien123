<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --gold:#ffd700;
    --blue:#38bdf8;
    --pink:#f43f5e;
    --green:#4ade80;
    --purple:#a855f7;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;

    background:
    radial-gradient(circle at center,
    #1e293b 0%,
    #0f172a 45%,
    #020617 100%);
}

body.rainbow-mode{
    transition:2s;
    background:
    radial-gradient(circle at center,
    #334155 0%,
    #0f172a 45%,
    #020617 100%);
}

.universe{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* ================= STARS ================= */

.star-field{
    position:absolute;
    inset:0;
    z-index:1;
}

.star{
    position:absolute;
    background:#fff;
    border-radius:50%;
    animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{

    0%,100%{
        opacity:.2;
        transform:scale(1);
    }

    50%{
        opacity:1;
        transform:scale(1.6);
    }

}

/* ================= CLOUDS ================= */

.cloud-layer{
    position:absolute;
    inset:0;
    z-index:2;
    opacity:.2;
    pointer-events:none;
}

.cloud{
    position:absolute;
    width:420px;
    height:170px;
    fill:rgba(255,255,255,.2);
    animation:cloudMove linear infinite;
}

.cloud:nth-child(1){
    top:10%;
    animation-duration:90s;
}

.cloud:nth-child(2){
    top:35%;
    animation-duration:120s;
}

.cloud:nth-child(3){
    top:60%;
    animation-duration:150s;
}

@keyframes cloudMove{

    from{
        transform:translateX(-500px);
    }

    to{
        transform:translateX(calc(100vw + 500px));
    }

}

/* ================= SUN ================= */

.sun{
    position:absolute;
    top:35%;
    left:50%;
    transform:translate(-50%,-50%);
    width:240px;
    height:240px;
    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(255,255,255,1) 0%,
    rgba(255,238,0,.6) 40%,
    rgba(255,238,0,0) 100%);

    opacity:0;
    z-index:3;
    transition:2s;
}

.sun.active{
    opacity:1;
}

/* ================= RAINBOW ================= */

.rainbow{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85vw;
    height:85vw;
    max-width:900px;
    max-height:900px;

    border-radius:50%;
    filter:blur(10px);

    opacity:0;
    z-index:4;
    transition:2s;

    background:
    radial-gradient(circle at center,
    transparent 50%,
    rgba(168,85,247,.4) 52%,
    rgba(59,130,246,.45) 54%,
    rgba(6,182,212,.5) 56%,
    rgba(34,197,94,.55) 58%,
    rgba(250,204,21,.55) 60%,
    rgba(249,115,22,.55) 62%,
    rgba(239,68,68,.6) 64%,
    transparent 66%);
}

.rainbow.active{
    opacity:1;
}

/* ================= RAIN ================= */

.rain-layer{
    position:absolute;
    inset:0;
    z-index:5;
    display:none;
    pointer-events:none;
}

.rain{
    position:absolute;
    width:1px;
    height:60px;

    background:
    linear-gradient(to bottom,
    transparent,
    rgba(255,255,255,.5));

    animation:rainFall linear infinite;
}

@keyframes rainFall{

    from{
        transform:translateY(-80px);
    }

    to{
        transform:translateY(120vh);
    }

}

/* ================= SPECIAL STARS ================= */

.special-stars{
    position:absolute;
    inset:0;
    z-index:10;
    transition:1s;
}

.magic-star{
    position:absolute;
    width:60px;
    height:60px;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;
    transition:.4s;
}

.magic-star:hover{
    transform:scale(1.25);
}

.magic-star i{
    font-size:28px;
    text-shadow:0 0 20px currentColor;
    z-index:2;
}

.magic-star .orbit{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    border:2px dashed currentColor;
    animation:rotate 10s linear infinite;
    opacity:.5;
}

@keyframes rotate{

    to{
        transform:rotate(360deg);
    }

}

.magic-star span{
    position:absolute;
    bottom:-35px;
    left:50%;
    transform:translateX(-50%);

    white-space:nowrap;

    font-size:11px;
    font-weight:700;
    letter-spacing:1px;

    padding:5px 12px;

    border-radius:10px;

    background:rgba(0,0,0,.5);

    border:1px solid currentColor;
    color:#fff;
}

/* ================= STAR COLORS ================= */

#hope{
    color:var(--gold);
}

#wisdom{
    color:var(--blue);
}

#peace{
    color:var(--pink);
}

#luck{
    color:var(--green);
}

#dream{
    color:var(--purple);
}

/* ================= PORTAL ================= */

.portal{
    position:absolute;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%) scale(.9);

    width:92%;
    max-width:760px;
    max-height:82vh;

    background:rgba(15,23,42,.78);

    backdrop-filter:blur(20px);

    border-radius:25px;

    border:1px solid rgba(255,255,255,.2);

    padding:30px;

    color:#fff;

    opacity:0;
    pointer-events:none;

    z-index:30;

    transition:.5s;
}

.portal.active{
    opacity:1;
    pointer-events:auto;
    transform:translate(-50%,-50%) scale(1);
}

.portal-content{
    overflow-y:auto;
    max-height:65vh;
    padding-right:10px;
}

.portal-content::-webkit-scrollbar{
    width:5px;
}

.portal-content::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,.3);
    border-radius:20px;
}

.portal h2{
    font-size:34px;
    margin-bottom:20px;
    font-weight:800;
}

.lesson-title{
    font-size:24px;
    font-weight:800;
    margin-bottom:12px;
}

.lesson-sub{
    margin-bottom:22px;
    color:#93c5fd;
}

.badge-topic{
    display:inline-flex;
    align-items:center;
    gap:8px;

    padding:8px 15px;

    border-radius:50px;

    background:
    linear-gradient(135deg,
    #2563eb,
    #7c3aed);

    font-size:13px;
    font-weight:700;

    margin-bottom:20px;
}

.portal ul{
    padding-left:20px;
}

.portal li{
    margin-bottom:18px;
    line-height:1.9;
    color:#e2e8f0;
}

.portal strong{
    color:#fff;
}

/* ================= BACK BUTTON ================= */

.back-btn{
    width:55px;
    height:55px;

    margin:25px auto 0;

    position:relative;

    transform:rotate(45deg);

    border-radius:0 100% 100% 100%;

    background:
    linear-gradient(135deg,
    #38bdf8,
    #0369a1);

    cursor:pointer;

    box-shadow:0 10px 25px rgba(0,0,0,.4);

    transition:.4s;
}

.back-btn:hover{
    transform:rotate(45deg) scale(1.1);
}

.back-btn i{
    position:absolute;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%) rotate(-45deg);

    color:#fff;
    font-size:22px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    .magic-star{
        transform:scale(.85);
    }

    .magic-star span{
        font-size:9px;
    }

    .portal{
        padding:22px;
    }

    .portal h2{
        font-size:24px;
    }

}

</style>
</head>

for(let i = 0; i < 150; i++){

    const star = document.createElement("div");

    star.classList.add("star");

    let size = Math.random() * 3 + 1;

    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";

    star.style.animationDelay = Math.random() * 5 + "s";

    starField.appendChild(star);
}

/* ================= CREATE RAIN ================= */

const rainLayer = document.getElementById("rainLayer");

for(let i = 0; i < 40; i++){

    const rain = document.createElement("div");

    rain.classList.add("rain");

    rain.style.left = Math.random() * 100 + "%";

    rain.style.animationDuration =
    Math.random() * 0.5 + 0.5 + "s";

    rain.style.animationDelay =
    Math.random() * 2 + "s";

    rainLayer.appendChild(rain);
}

/* ================= OPEN PORTAL ================= */

const stars = document.querySelectorAll(".magic-star");

const portal = document.getElementById("portal");

const title = document.getElementById("title");

const desc = document.getElementById("desc");

const specialStars = document.getElementById("specialStars");

const sun = document.getElementById("sun");

const rainbow = document.getElementById("rainbow");

stars.forEach(star => {

    star.addEventListener("click", () => {

        let id = star.id;

        let item = cosmicMasterRepository[id];

        if(!item) return;

        specialStars.style.opacity = "0";
        specialStars.style.transform = "scale(.95)";

        document.body.classList.add("rainbow-mode");

        rainLayer.style.display = "block";

        setTimeout(() => {

            sun.classList.add("active");
            rainbow.classList.add("active");

        },100);

        title.innerHTML = item.title;

        title.style.color =
        getComputedStyle(star).color;

        desc.innerHTML = item.text;

        setTimeout(() => {

            portal.classList.add("active");

        },300);

    });

});

/* ================= BACK ================= */

document.getElementById("backBtn")
.addEventListener("click", () => {

    portal.classList.remove("active");

    sun.classList.remove("active");

    rainbow.classList.remove("active");

    document.body.classList.remove("rainbow-mode");

    setTimeout(() => {

        rainLayer.style.display = "none";

        specialStars.style.opacity = "1";

        specialStars.style.transform = "scale(1)";

    },400);

});

</script>

</body>
</html>
